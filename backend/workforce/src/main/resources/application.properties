spring.application.name=workforce

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/dbworkforcehub
spring.datasource.username=postgres
spring.datasource.password=password123

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schema Initialization
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# Circular References
spring.main.allow-circular-references=true

# Server Port (optional, default is 8080)
server.port=8080

# JWT Configuration
jwt.secret=bezKoderSecretKeybezKoderSecretKeybezKoderSecretKeybezKoderSecretKey
jwt.expiration=86400000

# Add database debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true
springdoc.cache.disabled=true
springdoc.writer-with-default-pretty-printer=true
# Skip DefaultExceptionHandler during scanning
springdoc.packages-to-scan=cit.edu.workforce.Controller
springdoc.paths-to-match=/api/**
